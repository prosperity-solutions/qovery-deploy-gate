gate:
  image:
    repository: ghcr.io/prosperity-solutions/qovery-deploy-gate/gate
    # Defaults to Chart.AppVersion if empty
    tag: ""
    pullPolicy: IfNotPresent
  replicas: 2
  minSettleTime: 30
  deploymentTtl: 7200    # seconds before active deployments are marked expired (default 2h)
  port: 8080
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  database:
    external: false
    url: ""

webhook:
  image:
    repository: ghcr.io/prosperity-solutions/qovery-deploy-gate/webhook
    # Defaults to Chart.AppVersion if empty
    tag: ""
    pullPolicy: IfNotPresent
  replicas: 2
  port: 8443
  failurePolicy: Fail
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

sidecar:
  image:
    repository: ghcr.io/prosperity-solutions/qovery-deploy-gate/sidecar
    # Defaults to Chart.AppVersion if empty
    tag: ""
  pollInterval: 5
  rbac:
    # IMPORTANT: When empty, sidecar RBAC grants pods/status PATCH to ALL service accounts
    # cluster-wide. This is needed because Qovery creates namespaces dynamically, but it means
    # any pod in the cluster can read pod metadata and patch pod status conditions.
    # For production, restrict to your application namespaces:
    #   serviceAccountNamespaces: [app-ns-1, app-ns-2]
    serviceAccountNamespaces: []

postgresql:
  enabled: true
  auth:
    database: deploy_gate
    username: deploy_gate
    # IMPORTANT: Override this in production! Use postgresql.auth.existingSecret for better security.
    password: deploy_gate
  primary:
    persistence:
      size: 1Gi

certManager:
  # Set to false if you provide your own ClusterIssuer/Issuer
  createSelfSignedIssuer: true
  issuerRef:
    # When createSelfSignedIssuer is true, this is auto-set to <fullname>-selfsigned
    name: ""
    kind: Issuer
