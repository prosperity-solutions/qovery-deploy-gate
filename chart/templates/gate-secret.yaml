apiVersion: v1
kind: Secret
metadata:
  name: {{ include "qovery-deploy-gate.fullname" . }}-gate
  labels:
    {{- include "qovery-deploy-gate.gate.labels" . | nindent 4 }}
type: Opaque
stringData:
  DATABASE_URL: {{ include "qovery-deploy-gate.databaseUrl" . | quote }}
---
# Hook-managed copy of the secret for the pre-install migration job
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "qovery-deploy-gate.fullname" . }}-gate-migrate
  labels:
    {{- include "qovery-deploy-gate.gate.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": hook-succeeded,hook-failed
type: Opaque
stringData:
  DATABASE_URL: {{ include "qovery-deploy-gate.databaseUrl" . | quote }}
