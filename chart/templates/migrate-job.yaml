apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "qovery-deploy-gate.fullname" . }}-migrate-{{ .Release.Revision }}
  labels:
    {{- include "qovery-deploy-gate.labels" . | nindent 4 }}
    app.kubernetes.io/component: migration
  annotations:
    "helm.sh/hook": post-install,pre-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": hook-succeeded,hook-failed
spec:
  backoffLimit: 6
  template:
    metadata:
      labels:
        {{- include "qovery-deploy-gate.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: migration
    spec:
      restartPolicy: OnFailure
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: migrate
          image: "{{ .Values.gate.image.repository }}:{{ .Values.gate.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.gate.image.pullPolicy }}
          command:
            - node_modules/.bin/prisma
            - migrate
            - deploy
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "qovery-deploy-gate.fullname" . }}-gate-migrate
                  key: DATABASE_URL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: home-cache
              mountPath: /home/node/.cache
      volumes:
        - name: tmp
          emptyDir: {}
        - name: home-cache
          emptyDir: {}
