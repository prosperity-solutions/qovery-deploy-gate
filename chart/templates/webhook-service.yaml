apiVersion: v1
kind: Service
metadata:
  name: {{ include "qovery-deploy-gate.fullname" . }}-webhook
  labels:
    {{- include "qovery-deploy-gate.webhook.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 443
      targetPort: https
      protocol: TCP
      name: https
  selector:
    {{- include "qovery-deploy-gate.webhook.selectorLabels" . | nindent 4 }}
